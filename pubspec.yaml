name: tiffani
description: "Tiffani - Korean Beauty Catalog & Request-Based Ordering App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.8.1

  # Dependency Injection
  get_it: ^8.0.3

  # Backend
  supabase_flutter: ^2.8.4

  # Image Loading & Caching
  cached_network_image: ^3.4.1

  # UI Components
  shimmer: ^3.0.0
  carousel_slider: ^5.0.0
  flutter_svg: ^2.0.17

  # Local Storage
  shared_preferences: ^2.3.4

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.3.1
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
